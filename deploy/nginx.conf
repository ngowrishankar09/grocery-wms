server {
    listen 80;
    server_name rapiddockwms.com www.rapiddockwms.com;
    # Redirect all HTTP to HTTPS (Certbot will fill this in)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rapiddockwms.com www.rapiddockwms.com;

    # SSL certs — filled in by Certbot automatically
    # ssl_certificate     /etc/letsencrypt/live/rapiddockwms.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/rapiddockwms.com/privkey.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── API → FastAPI backend ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # ── Static product images ──────────────────────────────────
    location /static/ {
        alias /var/www/rapiddockwms/backend/static/;
        expires 7d;
    }

    # ── React frontend (SPA) ───────────────────────────────────
    root /var/www/rapiddockwms/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
